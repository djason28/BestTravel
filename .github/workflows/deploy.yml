name: Deploy to Rocky via SSH

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (for metadata only)
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            # 1) Ensure directory exists
            REPO_PATH=${{ secrets.SERVER_PATH }}
            if [ -z "$REPO_PATH" ]; then
              echo "SERVER_PATH secret is required (e.g., /home/rocky/BestTravel)" >&2
              exit 1
            fi
            mkdir -p "$REPO_PATH"

            # 2) Clone or update repository
            if [ ! -d "$REPO_PATH/.git" ]; then
              echo "Cloning repo..."
              git clone --depth=1 https://github.com/${{ github.repository }} "$REPO_PATH"
            fi
            cd "$REPO_PATH"
            git fetch origin
            git checkout -f main
            git reset --hard origin/main

            # 3) Ensure .env exists (create if missing)
            if [ ! -f .env ]; then
              echo "Creating .env from .env.example"
              cp .env.example .env || true
              # Set DOMAIN and JWT_SECRET from secrets if provided
              if [ -n "${{ secrets.DOMAIN || '' }}" ]; then
                sed -i "s/^DOMAIN=.*/DOMAIN=${{ secrets.DOMAIN }}/" .env || echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env
              fi
              if [ -n "${{ secrets.JWT_SECRET || '' }}" ]; then
                sed -i "s/^JWT_SECRET=.*/JWT_SECRET=${{ secrets.JWT_SECRET }}/" .env || echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
              fi
            fi

            # 4) Make sure deploy.sh is executable
            chmod +x deploy.sh || true

            # 5) Run deploy (build FE via node container, compose up -d --build)
            ./deploy.sh

            # 6) Show status
            docker compose ps
