services:
  backend:
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: besttravel-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - APP_ENV=production
      - DB_DRIVER=turso
      - GIN_MODE=release
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
