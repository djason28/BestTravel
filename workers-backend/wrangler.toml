name = "besttravel-worker"
main = "src/index.ts"
compatibility_date = "2025-12-01"

# Konfigurasi R2 Bucket
[[r2_buckets]]
binding = "MY_BUCKET"
bucket_name = "best-assets"
preview_bucket_name = "best-assets"

# Variabel Lingkungan (Setel rahasia dengan `wrangler secret put`)
[vars]
# Update APP_URL to your deployed frontend origin (Cloudflare Pages domain)
APP_URL = "https://your-domain.example"
APP_ENV = "production"
DB_DRIVER = "turso"

# Izinkan CORS
[dev]
port = 8787
